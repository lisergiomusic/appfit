<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Protótipo — Exercicio Detalhe</title>
  <style>
    /* AppTheme-inspired dark kit */
    :root{
      --background:#121212;
      --surface:#1e1e1e;
      --surface-weak: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.098); /* ~alpha 25 */
      --text-primary:#ffffff;
      --text-secondary: rgba(255,255,255,0.62);
      --accent:#ff9f0a;
      --primary:#30d158;
      --radius:16px;
      --card-radius:16px;
      --space-8:8px; --space-12:12px; --space-16:16px; --space-24:24px;
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }
    html,body{height:100%;margin:0;background:var(--background);color:var(--text-primary)}
    .wrap{max-width:720px;margin:0 auto;padding:20px 16px 32px}

    /* AppBar */
    .appbar{display:flex;align-items:center;justify-content:space-between;height:56px}
    .left{display:flex;align-items:center}
    .circle-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
    .title{font-weight:700;font-size:17px;text-align:center;flex:1;color:var(--text-primary)}
    .action-btn{color:var(--accent);background:transparent;border:none;padding:6px 12px;font-weight:600;font-size:17px}

    /* Hero title */
    .hero{font-size:34px;font-weight:700;line-height:1.14;margin:8px 0 12px}

    /* Video card */
    .video-card{border-radius:var(--card-radius);overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.08));border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,0.6)}
    .video-thumb{position:relative;padding-top:56.25%;background-size:cover;background-position:center}
    .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.14)}
    .play svg{width:26px;height:26px;fill:#fff}

    /* Section eyebrow */
    .eyebrow{font-size:10px;font-weight:600;color:var(--text-secondary);letter-spacing:1px}

    /* Instructions field */
    .instructions{margin-top:16px}
    textarea{width:100%;min-height:88px;max-height:220px;padding:16px;border-radius:16px;background:var(--surface);color:var(--text-primary);border:1px solid var(--border);resize:vertical;font-size:14px}
    textarea::placeholder{color:var(--text-secondary)}

    /* Series section */
    .section{margin-top:24px}
    .section-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--primary)}
    .section-title{font-weight:700;font-size:10px}

    .series-list{border-radius:18px;padding:8px;background:transparent}
    .serie-row{display:flex;align-items:center;gap:8px;padding:10px;border-radius:18px;background:var(--surface);border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.6);margin-bottom:8px}
    .serie-row .num{width:32px;text-align:left;padding-left:8px;font-weight:700}
    .serie-row input{background:transparent;border:none;color:var(--text-primary);text-align:center;font-weight:600;font-size:14px}
    .serie-row .col{flex:1}

    .add-btn{display:inline-block;margin:16px auto 0;padding:12px 20px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.06));border:1px solid var(--border);color:var(--primary);font-weight:700}

    /* small screens */
    @media(max-width:420px){.wrap{padding-left:12px;padding-right:12px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="appbar">
      <div class="left"><button class="circle-btn" aria-label="Voltar">⟵</button></div>
      <div class="title">Agachamento</div>
      <button class="action-btn">Concluir</button>
    </div>

    <div class="hero">Agachamento</div>

    <div class="eyebrow">PERNAS • GLÚTEOS</div>

    <div style="height:16px"></div>

    <div class="video-card">
      <div class="video-thumb" style="background-image:url('https://picsum.photos/1200/675?blur=2')">
        <div class="play" role="button" aria-label="Assistir vídeo">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    </div>

    <div style="height:24px"></div>

    <div class="instructions">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="eyebrow">INSTRUÇÕES</div>
        <button id="finish" class="action-btn" style="display:none">Concluir ✓</button>
      </div>
      <div style="height:8px"></div>
      <textarea id="instr" placeholder="Toque para adicionar instruções de execução..."></textarea>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="dot" style="background:var(--primary)"></div>
        <div class="section-title">AQUECIMENTO</div>
      </div>

      <div class="series-list">
        <div class="serie-row">
          <div class="num">1</div>
          <div class="col"><input value="10" /></div>
          <div class="col"><input value="-" /></div>
          <div class="col"><input value="60s" /></div>
        </div>
        <div class="serie-row">
          <div class="num">2</div>
          <div class="col"><input value="8" /></div>
          <div class="col"><input value="20kg" /></div>
          <div class="col"><input value="60s" /></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="dot" style="background:var(--accent)"></div>
        <div class="section-title">FEEDER</div>
      </div>
      <div class="series-list">
        <div class="serie-row">
          <div class="num">1</div>
          <div class="col"><input value="5" /></div>
          <div class="col"><input value="-" /></div>
          <div class="col"><input value="30s" /></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="dot" style="background:var(--primary)"></div>
        <div class="section-title">SÉRIES DE TRABALHO</div>
      </div>
      <div class="series-list">
        <div class="serie-row">
          <div class="num">1</div>
          <div class="col"><input value="6" /></div>
          <div class="col"><input value="80kg" /></div>
          <div class="col"><input value="90s" /></div>
        </div>
      </div>
    </div>

    <div style="text-align:center">
      <button class="add-btn">Adicionar Série</button>
    </div>
  </div>

  <script>
    const ta = document.getElementById('instr');
    const finish = document.getElementById('finish');
    ta.addEventListener('focus', () => { finish.style.display='inline-block'; ta.placeholder=''; });
    ta.addEventListener('blur', () => { if(!ta.value.trim()) ta.placeholder='Toque para adicionar instruções de execução...'; finish.style.display='none'; });
  </script>
</body>
</html>
